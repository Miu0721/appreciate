<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Appreciate - 感謝を送る</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎉</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }

    html {
      height: -webkit-fill-available;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 24px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
      padding-top: 20px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: #a0a0a0;
    }

    /* Code Input Screen */
    .code-screen {
      display: block;
    }

    .code-screen.hide {
      display: none;
    }

    .code-input-container {
      margin-bottom: 24px;
    }

    .code-label {
      font-size: 14px;
      color: #a0a0a0;
      margin-bottom: 12px;
      display: block;
    }

    .code-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      font-size: 24px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    .code-input::placeholder {
      color: #666;
      letter-spacing: 0;
    }

    .code-input:focus {
      outline: none;
      border-color: #f093fb;
    }

    .code-error {
      color: #f5576c;
      font-size: 14px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }

    .code-error.show {
      display: block;
    }

    .next-btn {
      width: 100%;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      padding: 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .next-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Form Screen */
    .form-screen {
      display: none;
    }

    .form-screen.show {
      display: block;
    }

    .event-info {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: center;
    }

    .event-title {
      font-size: 18px;
      font-weight: 600;
    }

    .form-section {
      margin-bottom: 24px;
    }

    .section-label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #a0a0a0;
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    .emoji-btn {
      width: 100%;
      aspect-ratio: 1;
      font-size: 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .emoji-btn:hover, .emoji-btn:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .emoji-btn.selected {
      border-color: #f093fb;
      background: rgba(240, 147, 251, 0.2);
    }

    .selected-emojis {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 40px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      margin-top: 16px;
    }

    .selected-emoji {
      font-size: 24px;
      padding: 4px 8px;
      background: rgba(240, 147, 251, 0.2);
      border-radius: 8px;
      cursor: pointer;
    }

    .placeholder-text {
      color: #666;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      height: 100px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      color: #fff;
      resize: none;
      font-family: inherit;
    }

    textarea::placeholder {
      color: #666;
    }

    textarea:focus {
      outline: none;
      border-color: #f093fb;
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      padding: 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 16px;
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .back-btn {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #a0a0a0;
      font-size: 14px;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
    }

    /* Success Screen */
    .success-screen {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .success-screen.show {
      display: block;
    }

    .success-icon {
      font-size: 80px;
      margin-bottom: 24px;
    }

    .success-text {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .success-subtext {
      color: #a0a0a0;
    }

    /* Closed Screen */
    .closed-screen {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .closed-screen.show {
      display: block;
    }

    .closed-icon {
      font-size: 64px;
      margin-bottom: 24px;
    }

    .closed-text {
      font-size: 20px;
      color: #a0a0a0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🎉</div>
      <h1>Appreciate</h1>
      <p class="subtitle">イベント感謝収集システム</p>
    </div>

    <!-- Code Input Screen -->
    <div class="code-screen" id="code-screen">
      <div class="code-input-container">
        <label class="code-label">イベントコードを入力してください</label>
        <input type="text" class="code-input" id="code-input" placeholder="例: ABC123" maxlength="8" autocomplete="off">
        <p class="code-error" id="code-error">イベントコードが見つかりません</p>
      </div>
      <button class="next-btn" id="next-btn" disabled>次へ</button>
    </div>

    <!-- Form Screen -->
    <div class="form-screen" id="form-screen">
      <div class="event-info">
        <p class="event-title" id="event-title">イベント名</p>
      </div>

      <div class="form-section">
        <p class="section-label">絵文字を選択（複数選択可）</p>
        <div class="emoji-grid" id="emoji-grid"></div>
        <div class="selected-emojis" id="selected-emojis">
          <span class="placeholder-text">絵文字をタップして選択</span>
        </div>
      </div>

      <div class="form-section">
        <p class="section-label">メッセージ（任意）</p>
        <textarea id="message" placeholder="感謝のメッセージを入力..." maxlength="200"></textarea>
        <p class="char-count"><span id="char-count">0</span> / 200</p>
      </div>

      <button class="submit-btn" id="submit-btn" disabled>感謝を送信する</button>
      <button class="back-btn" id="back-btn">戻る</button>
    </div>

    <!-- Success Screen -->
    <div class="success-screen" id="success-screen">
      <div class="success-icon">✨</div>
      <p class="success-text">感謝を送信しました！</p>
      <p class="success-subtext">主催者に届けられます</p>
    </div>

    <!-- Closed Screen -->
    <div class="closed-screen" id="closed-screen">
      <div class="closed-icon">⏰</div>
      <p class="closed-text">このイベントの感謝受付は<br>終了しました</p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDZ-1AOlsX-on8pGObY_5Nvgb-rDojvWKQ",
      authDomain: "appreciate-54692.firebaseapp.com",
      projectId: "appreciate-54692",
      storageBucket: "appreciate-54692.appspot.com",
      messagingSenderId: "485534490091",
      appId: "1:485534490091:web:1e3c23eacdeb8b12598dae"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Elements
    const codeScreen = document.getElementById('code-screen');
    const formScreen = document.getElementById('form-screen');
    const successScreen = document.getElementById('success-screen');
    const closedScreen = document.getElementById('closed-screen');
    const codeInput = document.getElementById('code-input');
    const codeError = document.getElementById('code-error');
    const nextBtn = document.getElementById('next-btn');
    const backBtn = document.getElementById('back-btn');
    const submitBtn = document.getElementById('submit-btn');
    const eventTitleEl = document.getElementById('event-title');
    const emojiGrid = document.getElementById('emoji-grid');
    const selectedEmojisEl = document.getElementById('selected-emojis');
    const messageInput = document.getElementById('message');
    const charCount = document.getElementById('char-count');

    const EMOJI_LIST = [
      '🙏', '👏', '🎉', '❤️', '💪', '🔥',
      '✨', '👍', '🌟', '💯', '🎊', '😊',
      '🤝', '💐', '🏆', '⭐', '💖', '🙌'
    ];

    let selectedEmojis = [];
    let currentEventCode = '';
    let currentEventData = null;

    // Render emoji grid
    emojiGrid.innerHTML = EMOJI_LIST.map(emoji => `
      <button class="emoji-btn" data-emoji="${emoji}">${emoji}</button>
    `).join('');

    // Code input handling
    codeInput.addEventListener('input', () => {
      const value = codeInput.value.toUpperCase();
      codeInput.value = value;
      nextBtn.disabled = value.length < 4;
      codeError.classList.remove('show');
    });

    // Next button - verify code
    nextBtn.addEventListener('click', async () => {
      const code = codeInput.value.toUpperCase();
      nextBtn.disabled = true;
      nextBtn.textContent = '確認中...';

      try {
        const eventDoc = await getDoc(doc(db, 'events', code));

        if (eventDoc.exists()) {
          const data = eventDoc.data();

          // Check if collection is still open
          if (data.status === 'completed') {
            codeScreen.classList.add('hide');
            closedScreen.classList.add('show');
            return;
          }

          currentEventCode = code;
          currentEventData = data;
          eventTitleEl.textContent = data.title || 'イベント';

          codeScreen.classList.add('hide');
          formScreen.classList.add('show');
        } else {
          codeError.classList.add('show');
        }
      } catch (error) {
        console.error('Error:', error);
        codeError.textContent = 'エラーが発生しました';
        codeError.classList.add('show');
      }

      nextBtn.disabled = false;
      nextBtn.textContent = '次へ';
    });

    // Back button
    backBtn.addEventListener('click', () => {
      formScreen.classList.remove('show');
      codeScreen.classList.remove('hide');
      selectedEmojis = [];
      updateSelectedDisplay();
      updateSubmitButton();
      document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('selected'));
      messageInput.value = '';
      charCount.textContent = '0';
    });

    // Toggle emoji selection
    emojiGrid.addEventListener('click', (e) => {
      if (e.target.classList.contains('emoji-btn')) {
        const emoji = e.target.dataset.emoji;
        const index = selectedEmojis.indexOf(emoji);

        if (index > -1) {
          selectedEmojis.splice(index, 1);
          e.target.classList.remove('selected');
        } else {
          selectedEmojis.push(emoji);
          e.target.classList.add('selected');
        }

        updateSelectedDisplay();
        updateSubmitButton();
      }
    });

    // Remove emoji from selected
    selectedEmojisEl.addEventListener('click', (e) => {
      if (e.target.classList.contains('selected-emoji')) {
        const emoji = e.target.textContent;
        const index = selectedEmojis.indexOf(emoji);
        if (index > -1) {
          selectedEmojis.splice(index, 1);
          document.querySelector(`.emoji-btn[data-emoji="${emoji}"]`)?.classList.remove('selected');
          updateSelectedDisplay();
          updateSubmitButton();
        }
      }
    });

    function updateSelectedDisplay() {
      if (selectedEmojis.length === 0) {
        selectedEmojisEl.innerHTML = '<span class="placeholder-text">絵文字をタップして選択</span>';
      } else {
        selectedEmojisEl.innerHTML = selectedEmojis.map(emoji =>
          `<span class="selected-emoji">${emoji}</span>`
        ).join('');
      }
    }

    function updateSubmitButton() {
      submitBtn.disabled = selectedEmojis.length === 0;
    }

    // Character count
    messageInput.addEventListener('input', () => {
      const count = messageInput.value.length;
      charCount.textContent = count;
    });

    // Submit
    submitBtn.addEventListener('click', async () => {
      if (selectedEmojis.length === 0) return;

      submitBtn.disabled = true;
      submitBtn.textContent = '送信中...';

      try {
        await addDoc(collection(db, 'gratitudes'), {
          eventCode: currentEventCode,
          emojis: selectedEmojis,
          message: messageInput.value.trim(),
          createdAt: serverTimestamp()
        });

        formScreen.classList.remove('show');
        successScreen.classList.add('show');
      } catch (error) {
        console.error('Error:', error);
        alert('送信に失敗しました。もう一度お試しください。');
        submitBtn.disabled = false;
        submitBtn.textContent = '感謝を送信する';
      }
    });
  </script>
</body>
</html>
