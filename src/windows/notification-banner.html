<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appreciate - 通知</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
      background: transparent;
      overflow: hidden;
    }

    .banner {
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 0.3s ease;
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .banner:hover {
      transform: scale(1.02);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .icon {
      font-size: 20px;
    }

    .title-group {
      flex: 1;
    }

    .app-name {
      font-size: 9px;
      color: #a0a0a0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .title {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #666;
      font-size: 12px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .event-name {
      font-size: 11px;
      color: #a0a0a0;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 8px;
      border-radius: 6px;
      text-decoration: none;
    }

    .cta-arrow {
      font-size: 12px;
    }

    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 12px;
      right: 12px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      animation: countdown 10s linear forwards;
    }

    @keyframes countdown {
      from { width: 100%; }
      to { width: 0%; }
    }
  </style>
</head>
<body>
  <div class="banner" id="banner">
    <div class="header">
      <span class="icon">🎉</span>
      <div class="title-group">
        <p class="app-name">Appreciate</p>
        <p class="title">イベントが終了しました</p>
      </div>
      <button class="close-btn" id="close-btn">×</button>
    </div>
    <p class="event-name" id="event-name">イベント名</p>
    <div class="cta" id="cta">
      感謝を送る
      <span class="cta-arrow">→</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <script>
    const banner = document.getElementById('banner');
    const closeBtn = document.getElementById('close-btn');
    const cta = document.getElementById('cta');
    const eventNameEl = document.getElementById('event-name');

    let eventId = '';
    let eventTitle = '';

    // Close button
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      window.electronAPI.closeNotificationBanner();
    });

    // CTA click - open participant window
    banner.addEventListener('click', () => {
      window.electronAPI.openParticipantWindow(eventId, eventTitle);
      window.electronAPI.closeNotificationBanner();
    });

    // Receive notification data
    window.electronAPI.onNotificationData((data) => {
      eventId = data.eventId;
      eventTitle = data.eventTitle;
      eventNameEl.textContent = eventTitle;
    });
  </script>
</body>
</html>
