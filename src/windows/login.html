<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appreciate - ログイン</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
    }

    .container {
      text-align: center;
      padding: 40px;
      -webkit-app-region: no-drag;
    }

    .logo {
      font-size: 64px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: #a0a0a0;
      margin-bottom: 40px;
    }

    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      color: #333;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn img {
      width: 24px;
      height: 24px;
    }

    .user-info {
      display: none;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      margin-top: 20px;
    }

    .user-info.show {
      display: block;
    }

    .user-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 16px;
      border: 3px solid rgba(255, 255, 255, 0.2);
    }

    .user-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .user-email {
      font-size: 14px;
      color: #a0a0a0;
      margin-bottom: 20px;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      color: #4ade80;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .logout-btn {
      margin-top: 20px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #a0a0a0;
      padding: 10px 24px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .loading {
      display: none;
      margin-top: 20px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #f093fb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎉</div>
    <h1>Appreciate</h1>
    <p class="subtitle">イベント感謝収集システム</p>

    <div id="login-section">
      <button class="login-btn" id="login-btn">
        <svg width="24" height="24" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Googleでログイン
      </button>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 16px; color: #a0a0a0;">認証中...</p>
      </div>
    </div>

    <div class="user-info" id="user-info">
      <img class="user-avatar" id="user-avatar" src="" alt="User Avatar">
      <p class="user-name" id="user-name"></p>
      <p class="user-email" id="user-email"></p>
      <div class="status">
        <span class="status-dot"></span>
        カレンダー監視中
      </div>
      <button class="logout-btn" id="logout-btn">ログアウト</button>
    </div>
  </div>

  <script>
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const loginSection = document.getElementById('login-section');
    const userInfo = document.getElementById('user-info');
    const loading = document.getElementById('loading');
    const userAvatar = document.getElementById('user-avatar');
    const userName = document.getElementById('user-name');
    const userEmail = document.getElementById('user-email');

    let authWindow = null;

    // Check for stored user on load
    async function checkStoredUser() {
      const user = await window.electronAPI.getStoredUser();
      if (user) {
        showUserInfo(user);
      }
    }

    function showUserInfo(user) {
      loginSection.style.display = 'none';
      userInfo.classList.add('show');
      userAvatar.src = user.picture || '';
      userName.textContent = user.name || 'User';
      userEmail.textContent = user.email || '';
    }

    function showLogin() {
      loginSection.style.display = 'block';
      userInfo.classList.remove('show');
      loading.classList.remove('show');
      loginBtn.style.display = 'inline-flex';
    }

    // Login button click
    loginBtn.addEventListener('click', async () => {
      loginBtn.style.display = 'none';
      loading.classList.add('show');

      const authUrl = await window.electronAPI.getAuthUrl();

      // Open auth window
      authWindow = window.open(authUrl, 'Google Login', 'width=500,height=600');

      // Listen for OAuth code
      window.addEventListener('message', async (event) => {
        if (event.data.type === 'oauth-code') {
          const result = await window.electronAPI.exchangeCode(event.data.code);
          if (result.success) {
            showUserInfo(result.user);
          } else {
            alert('認証に失敗しました: ' + result.error);
            showLogin();
          }
        }
      });
    });

    // Logout button click
    logoutBtn.addEventListener('click', async () => {
      await window.electronAPI.logout();
      showLogin();
    });

    // Initial check
    checkStoredUser();
  </script>
</body>
</html>
