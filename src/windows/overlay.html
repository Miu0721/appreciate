<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appreciate - 感謝オーバーレイ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
      background: transparent;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      pointer-events: none;
    }

    /* 右下の感謝カードエリア - ライブ配信風 */
    .gratitude-area {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 340px;
      height: calc(100vh - 160px);
      overflow: visible;
      pointer-events: none;
    }

    .gratitude-card {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 100%;
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.15);
      pointer-events: auto;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      animation: streamUp 30s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }

    @keyframes streamUp {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      2% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      90% {
        opacity: 1;
        transform: translateY(-500px) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-550px) scale(0.95);
      }
    }

    .gratitude-card.fade-out {
      animation: fadeOut 0.8s ease forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: scale(0.9);
      }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .gratitude-emojis {
      font-size: 28px;
      animation: wiggle 0.6s ease;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
    }

    .sender-info {
      flex: 1;
    }

    .gratitude-sender {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    .gratitude-time {
      font-size: 10px;
      color: #888;
    }

    .gratitude-message {
      font-size: 14px;
      line-height: 1.5;
      color: #e0e0e0;
      margin-top: 4px;
    }

    /* 左下のカウンター＆コントロール */
    .control-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
    }

    .counter {
      background: rgba(26, 26, 46, 0.92);
      backdrop-filter: blur(20px);
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .counter span {
      font-weight: 700;
      color: #f093fb;
    }

    .summary-btn {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
    }

    .summary-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(240, 147, 251, 0.5);
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: #fff;
      font-size: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    /* 画面下部から湧き上がる絵文字 - ライブ配信風 */
    .emoji-particle {
      position: fixed;
      bottom: -50px;
      font-size: 42px;
      pointer-events: none;
      animation: emojiBubble 5s ease-out forwards;
      opacity: 0;
      z-index: 1000;
    }

    @keyframes emojiBubble {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.5);
      }
      5% {
        opacity: 1;
        transform: translateY(-50px) scale(1.1);
      }
      10% {
        transform: translateY(-100px) scale(1);
      }
      50% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-100vh) scale(0.8);
      }
    }

    /* タイトルヘッダー（初回のみ表示） */
    .title-header {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(26, 26, 46, 0.92);
      backdrop-filter: blur(20px);
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      pointer-events: auto;
      animation: slideIn 0.5s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .title-header h1 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }

    .title-header p {
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="title-header">
    <h1>感謝が届いています</h1>
    <p id="event-title"></p>
  </div>

  <div class="gratitude-area" id="gratitude-area"></div>

  <div class="control-panel">
    <div class="counter">
      <span id="gratitude-count">0</span> 件の感謝
    </div>
    <button class="summary-btn" id="summary-btn">サマリー</button>
    <button class="close-btn" id="close-btn">×</button>
  </div>

  <script>
    const closeBtn = document.getElementById('close-btn');
    const summaryBtn = document.getElementById('summary-btn');
    const eventTitleEl = document.getElementById('event-title');
    const gratitudeArea = document.getElementById('gratitude-area');
    const gratitudeCountEl = document.getElementById('gratitude-count');

    let eventCode = '';
    let gratitudes = [];
    let currentIndex = 0;
    let totalCount = 0;

    // Close overlay
    closeBtn.addEventListener('click', () => {
      window.electronAPI.closeOverlay();
    });

    // Open summary
    summaryBtn.addEventListener('click', () => {
      window.electronAPI.openSummary(eventCode);
      window.electronAPI.closeOverlay();
    });

    // 画面下部から絵文字が湧き上がる
    function createEmojiParticle(emoji) {
      const el = document.createElement('div');
      el.className = 'emoji-particle';
      el.textContent = emoji;
      // 画面右側エリア（右半分〜右端）からランダムに発生
      const x = window.innerWidth * 0.5 + Math.random() * (window.innerWidth * 0.45);
      el.style.left = x + 'px';
      // 少しランダムなアニメーション時間で自然に
      const duration = 4 + Math.random() * 2;
      el.style.animationDuration = duration + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), duration * 1000);
    }

    // Display gratitude card - 30秒間表示して湧き上がる
    function displayGratitude(gratitude) {
      const card = document.createElement('div');
      card.className = 'gratitude-card';

      const emojis = gratitude.emojis || ['🙏'];
      const message = gratitude.message || '';
      const now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });

      card.innerHTML = `
        <div class="card-header">
          <div class="gratitude-emojis">${emojis.join('')}</div>
          <div class="sender-info">
            <div class="gratitude-time">${now}</div>
          </div>
        </div>
        ${message ? `<p class="gratitude-message">${message}</p>` : ''}
      `;

      // 各カードに少しずつオフセットを付けてスタート位置をずらす
      const existingCards = gratitudeArea.children.length;
      const offsetY = existingCards * 10;
      card.style.bottom = offsetY + 'px';

      gratitudeArea.appendChild(card);

      // 30秒後に自動削除（アニメーション終了時）
      setTimeout(() => {
        if (card.parentNode) {
          card.remove();
        }
      }, 30000);

      // 絵文字を画面下部から湧き上がらせる
      emojis.forEach((emoji, i) => {
        // 各絵文字を時間差で複数発生させる
        for (let j = 0; j < 3; j++) {
          setTimeout(() => {
            createEmojiParticle(emoji);
          }, i * 200 + j * 150);
        }
      });

      totalCount++;
      gratitudeCountEl.textContent = totalCount;
    }

    // Stream gratitudes one by one - ライブ配信風に連続表示
    function streamGratitudes() {
      if (currentIndex < gratitudes.length) {
        displayGratitude(gratitudes[currentIndex]);
        currentIndex++;
        // ライブ配信風に短い間隔で次々と表示（1.5-3秒間隔）
        const delay = 1500 + Math.random() * 1500;
        setTimeout(streamGratitudes, delay);
      }
    }

    // Listen for gratitude data
    window.electronAPI.onShowGratitudes(async (data) => {
      eventCode = data.eventCode;
      eventTitleEl.textContent = data.eventTitle;

      // Fetch gratitudes from Firestore (this would be done via IPC in real implementation)
      // For now, simulate with test data
      gratitudes = [
        { emojis: ['🎉', '👏'], message: '素晴らしい発表でした！', senderName: '田中太郎' },
        { emojis: ['🙏', '💪'], message: 'とても勉強になりました', senderName: '山田花子' },
        { emojis: ['❤️'], message: 'いつもありがとうございます！', senderName: '鈴木一郎' },
        { emojis: ['✨', '🔥'], message: '最高でした！', senderName: '佐藤次郎' },
        { emojis: ['👍'], message: '', senderName: '高橋三郎' }
      ];

      // Start streaming
      streamGratitudes();
    });
  </script>
</body>
</html>
