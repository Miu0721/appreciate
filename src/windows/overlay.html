<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appreciate - 感謝オーバーレイ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
      background: transparent;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      pointer-events: none;
    }

    /* 右下の感謝カードエリア - ライブ配信風 */
    .gratitude-area {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 340px;
      height: calc(100vh - 160px);
      overflow: visible;
      pointer-events: none;
    }

    .gratitude-card {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 100%;
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.15);
      pointer-events: auto;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      animation: streamUp 30s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }

    @keyframes streamUp {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      2% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      90% {
        opacity: 1;
        transform: translateY(-500px) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-550px) scale(0.95);
      }
    }

    .gratitude-card.fade-out {
      animation: fadeOut 0.8s ease forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: scale(0.9);
      }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .gratitude-emojis {
      font-size: 36px;
      animation: wiggle 0.6s ease;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
    }

    .sender-info {
      flex: 1;
    }

    .gratitude-sender {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    .gratitude-time {
      font-size: 10px;
      color: #888;
    }

    .gratitude-message {
      font-size: 14px;
      line-height: 1.5;
      color: #e0e0e0;
      margin-top: 4px;
    }

    /* 左下のカウンター＆コントロール */
    .control-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
    }

    .counter {
      background: rgba(26, 26, 46, 0.92);
      backdrop-filter: blur(20px);
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .counter span {
      font-weight: 700;
      color: #f093fb;
    }

    .summary-btn {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
    }

    .summary-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(240, 147, 251, 0.5);
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: #fff;
      font-size: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    /* 画面下部から湧き上がる絵文字 - ライブ配信風 */
    .emoji-particle {
      position: fixed;
      bottom: 80px;
      font-size: 32px;
      pointer-events: none;
      animation: floatUp 4s ease-out forwards;
      opacity: 0;
      z-index: 1000;
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.6);
      }
      10% {
        opacity: 1;
        transform: translateY(-30px) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-55vh) scale(0.85);
      }
    }

    /* タイトルヘッダー（初回のみ表示） */
    .title-header {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(26, 26, 46, 0.92);
      backdrop-filter: blur(20px);
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      pointer-events: auto;
      animation: slideIn 0.5s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .title-header h1 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }

    .title-header p {
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="title-header">
    <h1>感謝が届いています</h1>
    <p id="event-title"></p>
  </div>

  <div class="gratitude-area" id="gratitude-area"></div>

  <div class="control-panel">
    <div class="counter">
      <span id="gratitude-count">0</span> 件の感謝
    </div>
    <button class="summary-btn" id="summary-btn">サマリー</button>
    <button class="close-btn" id="close-btn">×</button>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, query, where, getDocs, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDZ-1AOlsX-on8pGObY_5Nvgb-rDojvWKQ",
      authDomain: "appreciate-54692.firebaseapp.com",
      projectId: "appreciate-54692",
      storageBucket: "appreciate-54692.appspot.com",
      messagingSenderId: "485534490091",
      appId: "1:485534490091:web:1e3c23eacdeb8b12598dae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const closeBtn = document.getElementById('close-btn');
    const summaryBtn = document.getElementById('summary-btn');
    const eventTitleEl = document.getElementById('event-title');
    const gratitudeArea = document.getElementById('gratitude-area');
    const gratitudeCountEl = document.getElementById('gratitude-count');

    let eventCode = '';
    let gratitudes = [];
    let currentIndex = 0;
    let totalCount = 0;
    let totalEmojis = 0;
    let activeParticles = 0;
    const MAX_PARTICLES = 100; // 同時パーティクル上限

    closeBtn.addEventListener('click', () => {
      window.electronAPI.closeOverlay();
    });

    summaryBtn.addEventListener('click', () => {
      window.electronAPI.openSummary(eventCode);
      window.electronAPI.closeOverlay();
    });

    // マウス位置に応じてクリック可能/透過を切り替え
    let isIgnoring = true;
    document.addEventListener('mousemove', (e) => {
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const isOverClickable = el && (
        el.closest('.control-panel') ||
        el.closest('.title-header') ||
        el.closest('.gratitude-card')
      );

      if (isOverClickable && isIgnoring) {
        isIgnoring = false;
        window.electronAPI.setIgnoreMouseEvents(false);
      } else if (!isOverClickable && !isIgnoring) {
        isIgnoring = true;
        window.electronAPI.setIgnoreMouseEvents(true);
      }
    });

    // パーティクル生成（自然な配置）
    function createEmojiParticle(emoji) {
      if (activeParticles >= MAX_PARTICLES) {
        console.log('MAX_PARTICLES reached, skipping:', emoji);
        return;
      }
      activeParticles++;

      const el = document.createElement('div');
      el.className = 'emoji-particle';
      el.textContent = emoji;

      // 画面右側30%にランダム配置
      const baseX = window.innerWidth * 0.65;
      const range = window.innerWidth * 0.30;
      const x = baseX + Math.random() * range;

      el.style.left = x + 'px';
      const duration = 4;
      el.style.animationDuration = duration + 's';
      document.body.appendChild(el);

      console.log('Particle created:', emoji, 'at x:', x, 'activeParticles:', activeParticles);

      setTimeout(() => {
        el.remove();
        activeParticles--;
      }, duration * 1000);
    }

    // 絵文字カウント表示
    function formatEmojiCounts(emojis) {
      const counts = {};
      emojis.forEach(e => counts[e] = (counts[e] || 0) + 1);
      return Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .map(([emoji, count]) => `${emoji}×${count}`)
        .join(' ');
    }

    // カード表示
    function displayGratitude(gratitude) {
      const card = document.createElement('div');
      card.className = 'gratitude-card';

      const emojis = gratitude.emojis || ['🙏'];
      const message = gratitude.message || '';
      const now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });

      // 20個超えたらカウント表示
      const emojiDisplay = emojis.length > 20
        ? formatEmojiCounts(emojis)
        : emojis.join('');

      card.innerHTML = `
        <div class="card-header">
          <div class="gratitude-emojis">${emojiDisplay}</div>
          <div class="sender-info">
            <div class="gratitude-sender">${gratitude.slackUserName || ''}</div>
            <div class="gratitude-time">${now} - ${emojis.length}個</div>
          </div>
        </div>
        ${message ? `<p class="gratitude-message">${message}</p>` : ''}
      `;

      const existingCards = gratitudeArea.children.length;
      card.style.bottom = (existingCards * 10) + 'px';
      gratitudeArea.appendChild(card);

      setTimeout(() => card.parentNode && card.remove(), 30000);

      // パーティクル（実際の数×3を緩めの間隔で表示）
      const multipliedEmojis = [];
      emojis.forEach(emoji => {
        for (let i = 0; i < 3; i++) {
          multipliedEmojis.push(emoji);
        }
      });

      console.log('Creating particles:', multipliedEmojis.length, 'from', emojis.length, 'emojis');
      const interval = 300; // 300ms間隔で統一
      multipliedEmojis.forEach((emoji, i) => {
        setTimeout(() => createEmojiParticle(emoji), i * interval);
      });

      totalCount++;
      totalEmojis += emojis.length;
      gratitudeCountEl.textContent = `${totalCount}件 / ${totalEmojis}絵文字`;
    }

    function streamGratitudes() {
      if (currentIndex < gratitudes.length) {
        displayGratitude(gratitudes[currentIndex]);
        currentIndex++;
        setTimeout(streamGratitudes, 2000); // 2秒間隔で統一
      }
    }

    // 表示済みIDを追跡
    const displayedIds = new Set();

    // Firestoreから初期データ取得
    async function fetchGratitudes(code) {
      try {
        const q = query(collection(db, 'gratitudes'), where('eventCode', '==', code));
        const snapshot = await getDocs(q);
        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        data.sort((a, b) => (a.createdAt?.toMillis?.() || 0) - (b.createdAt?.toMillis?.() || 0));
        return data;
      } catch (error) {
        console.error('Firestore error:', error);
        return [];
      }
    }

    // リアルタイム同期を開始
    function startRealtimeSync(code) {
      const q = query(collection(db, 'gratitudes'), where('eventCode', '==', code));

      onSnapshot(q, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
          if (change.type === 'added') {
            const gratitude = { id: change.doc.id, ...change.doc.data() };

            // 未表示の新しい感謝のみ表示
            if (!displayedIds.has(gratitude.id)) {
              displayedIds.add(gratitude.id);
              displayGratitude(gratitude);
              console.log('New gratitude received:', gratitude.id);
            }
          }
        });
      }, (error) => {
        console.error('Realtime sync error:', error);
      });
    }

    // メイン処理
    window.electronAPI.onShowGratitudes(async (data) => {
      eventCode = data.eventCode;
      eventTitleEl.textContent = data.eventTitle;

      // 初期データ取得
      gratitudes = await fetchGratitudes(eventCode);
      console.log(`Loaded ${gratitudes.length} gratitudes`);

      if (gratitudes.length === 0) {
        // データがない場合は待機メッセージを表示
        gratitudeCountEl.textContent = '感謝を待っています...';
      } else {
        // 既存データをストリーム表示
        gratitudes.forEach(g => displayedIds.add(g.id));
        streamGratitudes();
      }

      // リアルタイム同期を開始（新しい感謝を即座に表示）
      startRealtimeSync(eventCode);
    });
  </script>
</body>
</html>
