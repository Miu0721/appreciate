<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appreciate - 感謝を送る</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 40px;
      -webkit-app-region: drag;
    }

    .container {
      max-width: 450px;
      margin: 0 auto;
      -webkit-app-region: no-drag;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
      padding-top: 20px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .event-title {
      font-size: 16px;
      color: #a0a0a0;
    }

    .form-section {
      margin-bottom: 32px;
    }

    .section-label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #a0a0a0;
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
    }

    .emoji-btn {
      width: 100%;
      aspect-ratio: 1;
      font-size: 28px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .emoji-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.1);
    }

    .emoji-btn.selected {
      border-color: #f093fb;
      background: rgba(240, 147, 251, 0.2);
    }

    .selected-emojis {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 40px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      margin-top: 16px;
    }

    .selected-emoji {
      font-size: 24px;
      padding: 4px 8px;
      background: rgba(240, 147, 251, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .selected-emoji:hover {
      background: rgba(255, 0, 0, 0.3);
    }

    .placeholder-text {
      color: #666;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      color: #fff;
      resize: none;
      font-family: inherit;
    }

    textarea::placeholder {
      color: #666;
    }

    textarea:focus {
      outline: none;
      border-color: #f093fb;
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }

    .char-count.warning {
      color: #f5576c;
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border: none;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      padding: 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(240, 147, 251, 0.4);
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(240, 147, 251, 0.5);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success-message {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .success-message.show {
      display: block;
    }

    .success-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .success-text {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .success-subtext {
      color: #a0a0a0;
    }

    .form-container {
      display: block;
    }

    .form-container.hide {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🙏</div>
      <h1>感謝を送る</h1>
      <p class="event-title" id="event-title">イベント名</p>
    </div>

    <div class="form-container" id="form-container">
      <div class="form-section">
        <p class="section-label">絵文字を選択（複数選択可）</p>
        <div class="emoji-grid" id="emoji-grid"></div>
        <div class="selected-emojis" id="selected-emojis">
          <span class="placeholder-text">絵文字をクリックして選択</span>
        </div>
      </div>

      <div class="form-section">
        <p class="section-label">メッセージ（任意）</p>
        <textarea id="message" placeholder="感謝のメッセージを入力..." maxlength="200"></textarea>
        <p class="char-count"><span id="char-count">0</span> / 200</p>
      </div>

      <button class="submit-btn" id="submit-btn" disabled>感謝を送信する</button>
    </div>

    <div class="success-message" id="success-message">
      <div class="success-icon">✨</div>
      <p class="success-text">感謝を送信しました！</p>
      <p class="success-subtext">主催者に届けられます</p>
    </div>
  </div>

  <script>
    const EMOJI_LIST = [
      '🙏', '👏', '🎉', '❤️', '💪', '🔥',
      '✨', '👍', '🌟', '💯', '🎊', '😊',
      '🤝', '💐', '🏆', '⭐', '💖', '🙌'
    ];

    const emojiGrid = document.getElementById('emoji-grid');
    const selectedEmojisEl = document.getElementById('selected-emojis');
    const messageInput = document.getElementById('message');
    const charCount = document.getElementById('char-count');
    const submitBtn = document.getElementById('submit-btn');
    const formContainer = document.getElementById('form-container');
    const successMessage = document.getElementById('success-message');
    const eventTitleEl = document.getElementById('event-title');

    let selectedEmojis = [];
    let eventId = '';

    // Render emoji grid
    emojiGrid.innerHTML = EMOJI_LIST.map(emoji => `
      <button class="emoji-btn" data-emoji="${emoji}">${emoji}</button>
    `).join('');

    // Toggle emoji selection
    emojiGrid.addEventListener('click', (e) => {
      if (e.target.classList.contains('emoji-btn')) {
        const emoji = e.target.dataset.emoji;
        const index = selectedEmojis.indexOf(emoji);

        if (index > -1) {
          selectedEmojis.splice(index, 1);
          e.target.classList.remove('selected');
        } else {
          selectedEmojis.push(emoji);
          e.target.classList.add('selected');
        }

        updateSelectedDisplay();
        updateSubmitButton();
      }
    });

    // Remove emoji from selected
    selectedEmojisEl.addEventListener('click', (e) => {
      if (e.target.classList.contains('selected-emoji')) {
        const emoji = e.target.textContent;
        const index = selectedEmojis.indexOf(emoji);
        if (index > -1) {
          selectedEmojis.splice(index, 1);
          document.querySelector(`.emoji-btn[data-emoji="${emoji}"]`)?.classList.remove('selected');
          updateSelectedDisplay();
          updateSubmitButton();
        }
      }
    });

    function updateSelectedDisplay() {
      if (selectedEmojis.length === 0) {
        selectedEmojisEl.innerHTML = '<span class="placeholder-text">絵文字をクリックして選択</span>';
      } else {
        selectedEmojisEl.innerHTML = selectedEmojis.map(emoji =>
          `<span class="selected-emoji">${emoji}</span>`
        ).join('');
      }
    }

    function updateSubmitButton() {
      submitBtn.disabled = selectedEmojis.length === 0;
    }

    // Character count
    messageInput.addEventListener('input', () => {
      const count = messageInput.value.length;
      charCount.textContent = count;
      charCount.parentElement.classList.toggle('warning', count >= 180);
    });

    // Submit
    submitBtn.addEventListener('click', async () => {
      if (selectedEmojis.length === 0) return;

      submitBtn.disabled = true;
      submitBtn.textContent = '送信中...';

      try {
        const user = await window.electronAPI.getStoredUser();
        const result = await window.electronAPI.submitGratitude({
          eventCode: eventId,
          emojis: selectedEmojis,
          message: messageInput.value.trim(),
          senderEmail: user?.email || 'anonymous',
          senderName: user?.name || '匿名'
        });

        if (result.success) {
          formContainer.classList.add('hide');
          successMessage.classList.add('show');
          setTimeout(() => window.close(), 3000);
        } else {
          alert('送信に失敗しました: ' + result.error);
          submitBtn.disabled = false;
          submitBtn.textContent = '感謝を送信する';
        }
      } catch (error) {
        alert('エラーが発生しました');
        submitBtn.disabled = false;
        submitBtn.textContent = '感謝を送信する';
      }
    });

    // Receive event info
    window.electronAPI.onEventInfo((data) => {
      eventId = data.eventId;
      eventTitleEl.textContent = data.eventTitle;
    });
  </script>
</body>
</html>
